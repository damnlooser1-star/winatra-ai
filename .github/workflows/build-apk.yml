name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Create google-services.json
        run: echo "$GOOGLE_SERVICES_B64" | base64 --decode > android/app/google-services.json
        env:
          GOOGLE_SERVICES_B64: ${{ secrets.GOOGLE_SERVICES_B64 }}

      - name: Verify google-services.json
        run: head -3 android/app/google-services.json

      - name: Inject Groq API Key
        run: |
          sed -i "s/BUILD_GROQ_API_KEY/$GROQ_API_KEY/g" android/app/src/main/kotlin/com/example/winatra_ai/WinatraService.kt
          sed -i "s/BUILD_GROQ_API_KEY/$GROQ_API_KEY/g" android/app/src/main/kotlin/com/example/winatra_ai/WinatraKeyboardService.kt
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Install dependencies
        run: flutter pub get

      - name: Set Gradle heap
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=512m -XX:+UseSerialGC" >> ~/.gradle/gradle.properties
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties

      - name: Build APK
        run: flutter build apk --release --target-platform android-arm64

      - name: List files (debug)
        run: ls -la build/app/outputs/flutter-apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: winatra-ai-release
          path: build/app/outputs/flutter-apk/*.apk
