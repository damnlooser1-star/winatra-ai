name: winatra_ai
description: AI Shortcut with persistent notification and Groq API
version: 1.0.3+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.3
  awesome_notifications: ^0.11.0
  flutter_background_service: ^5.0.1
  http: ^1.2.1
  firebase_core: ^2.25.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  url_launcher: ^6.2.5
  file_picker: ^8.0.0
  path_provider: ^2.1.0
  firebase_remote_config: ^4.4.7
  package_info_plus: ^6.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  dio: ^5.3.0
  onenm_local_llm: ^0.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/qris.png